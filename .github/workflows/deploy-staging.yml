name: Deploy Staging (develop)

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STG_SFTP_HOST }}
          username: ${{ secrets.STG_SFTP_USER }}
          port: ${{ secrets.STG_SFTP_PORT }}
          # Use ONE auth method:
          # - Password auth: set STG_SFTP_PASSWORD
          # - Key auth: set STG_SFTP_KEY (private key)
          password: ${{ secrets.STG_SFTP_PASSWORD }}
          key: ${{ secrets.STG_SFTP_KEY }}
          # NOTE: scp-action does not support rsync-style exclude patterns.
          # Keep this simple to avoid 'tar: empty archive'.
          source: |
            ./*
          target: ${{ secrets.STG_PLUGIN_TARGET_DIR }}
          overwrite: true

      - name: Trigger plugin sync
        continue-on-error: true
        env:
          STG_WEBHOOK_SYNC_BASE_URL: ${{ secrets.STG_WEBHOOK_SYNC_BASE_URL }}
          STG_WEBHOOK_TOKEN: ${{ secrets.STG_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          url="${STG_WEBHOOK_SYNC_BASE_URL}"

          # Call sync using BOTH token-in-query and token header.
          # This avoids subtle secret formatting issues and makes debugging easier.
          http_code=$(curl -sS -o /tmp/webhook_sync_body.txt -w "%{http_code}" \
            -G "$url" \
            --data-urlencode "sync=1" \
            --data-urlencode "token=${STG_WEBHOOK_TOKEN}" \
            -H "X-ZeroSense-Token: ${STG_WEBHOOK_TOKEN}" \
            -H "Accept: application/json" \
            -H "User-Agent: GitHub-Hookshot/actions")

          if [ "$http_code" != "200" ]; then
            echo "Webhook sync failed with HTTP $http_code"
            cat /tmp/webhook_sync_body.txt
            echo "You may need to run sync manually in browser: ${url}?sync=1&token=***"
            exit 0
          fi

          cat /tmp/webhook_sync_body.txt
