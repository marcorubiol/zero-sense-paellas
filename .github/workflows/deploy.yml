name: Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'develop' }}
    concurrency:
      group: deploy-${{ github.ref_name == 'main' && 'production' || 'develop' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Deploy plugin via rsync (full sync with delete)
        run: |
          rsync -avzr --delete \
            --exclude='.git*' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SFTP_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.PLUGIN_TARGET_DIR }}/
          echo "✅ Full sync completed - orphaned files removed"

      - name: Clear caches post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          port: ${{ secrets.SFTP_PORT }}
          password: ${{ secrets.SFTP_PASSWORD }}
          key: ${{ secrets.SFTP_KEY }}
          script: |
            # Clear PHP opcache if available
            if command -v php > /dev/null 2>&1; then
              php -r "if(function_exists('opcache_reset')){opcache_reset();echo 'opcache cleared';}else{echo 'no opcache';}" 2>/dev/null || true
            fi
            # Clear ZS feature transients via WP-CLI if available
            if command -v wp > /dev/null 2>&1; then
              wp transient delete --all --path=$(dirname $(dirname $(dirname "${{ secrets.PLUGIN_TARGET_DIR }}"))) 2>/dev/null || true
            fi
